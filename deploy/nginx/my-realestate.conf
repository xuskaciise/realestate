# Reverse proxy for Next.js behind Nginx on Ubuntu (Hostinger VPS).
# Replace example.com with your domain before enabling SSL blocks.
#
# First-time SSL (after DNS points to this server):
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d example.com -d www.example.com
# Certbot will install certificates and can merge server blocks; adjust paths if it creates a separate file.

upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Optional: redirect HTTP → HTTPS once certificates exist (Certbot often adds this automatically).
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Security headers (HSTS belongs only on HTTPS — see block below)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml image/svg+xml;

    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Before SSL: proxy for testing. After certbot, switch this to: return 301 https://$host$request_uri;
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

